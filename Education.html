<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Education Hub – HUQ</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    /* ── Tokens ── */
    :root {
      --primary:        #1A5F5F;
      --primary-dim:    rgba(26,95,95,0.12);
      --primary-mid:    rgba(26,95,95,0.25);
      --accent:         #2A8A8A;
      --bg:             #F9F6F1;
      --surface:        #FFFFFF;
      --surface2:       #F2EDE6;
      --border:         #E0D8CE;
      --text:           #1A1A1A;
      --text2:          #4A4A4A;
      --muted:          #888880;
      --placeholder-bg: #F0EBE3;
      --shadow:         rgba(0,0,0,0.08);
      --radius-sm:      10px;
      --radius-md:      16px;
      --radius-lg:      22px;
      --transition:     0.22s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] {
      --bg:             #0D1B1B;
      --surface:        #152828;
      --surface2:       #1C3333;
      --border:         #1F3A3A;
      --text:           #F0F0F0;
      --text2:          #B8C8C8;
      --muted:          #6A8A8A;
      --placeholder-bg: #0F2424;
      --primary-dim:    rgba(26,95,95,0.20);
      --primary-mid:    rgba(26,95,95,0.35);
      --shadow:         rgba(0,0,0,0.35);
    }

    /* ── Base ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Layout Shell ── */
    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── Header ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
    }
    .back-btn {
      background: var(--primary-dim);
      border: none;
      color: var(--primary);
      font-size: 15px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .back-btn:active { background: var(--primary-mid); }
    .top-bar-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .huq-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-dim);
      padding: 4px 10px;
      border-radius: 50px;
      flex-shrink: 0;
    }

    /* ── Page views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Hero (home) ── */
    .home-hero {
      background: linear-gradient(145deg, var(--primary) 0%, var(--accent) 100%);
      padding: 36px 24px 28px;
      text-align: center;
      color: #fff;
    }
    .home-hero-icon { font-size: 52px; margin-bottom: 10px; display: block; }
    .home-hero h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 8px; }
    .home-hero p { font-size: 14px; opacity: 0.88; line-height: 1.6; max-width: 340px; margin: 0 auto; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 24px 20px 10px;
    }

    /* ── Category grid ── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 8px;
    }
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 14px 16px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }
    .cat-card:active { transform: scale(0.97); background: var(--surface2); }
    .cat-card-icon { font-size: 32px; margin-bottom: 10px; display: block; }
    .cat-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .cat-card-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .cat-card-arrow { font-size: 18px; color: var(--primary); font-weight: 300; margin-top: 10px; display: block; }

    /* General topics get a teal left border accent */
    .cat-card.general { border-left: 3px solid var(--primary); }

    /* ── Category page ── */
    .cat-hero {
      background: var(--primary-dim);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .cat-hero-icon { font-size: 44px; flex-shrink: 0; }
    .cat-hero-title { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .cat-hero-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }

    /* ── Topic list ── */
    .topic-list { padding: 12px 16px 40px; display: flex; flex-direction: column; gap: 10px; }
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .topic-card:active { background: var(--surface2); transform: scale(0.98); }
    .topic-card-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--primary-dim);
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .topic-card-body { flex: 1; }
    .topic-card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .topic-card-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .topic-card-arrow { font-size: 20px; color: var(--muted); flex-shrink: 0; }
    .topic-card.has-video .topic-card-num { background: var(--primary); color: #fff; }
    .topic-card.has-video .topic-card-arrow { color: var(--primary); }

    /* ── Video page ── */
    .video-hero {
      background: var(--primary-dim);
      border-bottom: 1px solid var(--border);
      padding: 20px;
    }
    .video-hero-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .video-hero-desc { font-size: 14px; color: var(--text2); line-height: 1.55; }

    .video-wrap {
      margin: 20px 16px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #000;
      aspect-ratio: 16/9;
      position: relative;
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .video-placeholder {
      width: 100%;
      height: 100%;
      background: var(--placeholder-bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    .video-placeholder-icon { font-size: 42px; opacity: 0.5; }
    .video-placeholder-text { font-size: 15px; font-weight: 600; }
    .video-placeholder-sub { font-size: 12px; opacity: 0.7; }

    .video-notes {
      margin: 0 16px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .video-notes-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .video-notes-text { font-size: 14px; color: var(--text2); line-height: 1.6; }

    /* ── Bottom padding ── */
    .pb { height: 32px; }
  </style>
</head>

  <div id="view-topic" class="view">

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let currentCategoryId = null;

// ──────────────────────────────────────────────
// ROUTER
// ──────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function showHome() {
  showView('view-home');
}

function showCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  currentCategoryId = catId;

  document.getElementById('cat-bar-title').textContent = cat.title;
  document.getElementById('cat-icon').textContent = cat.icon;
  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-desc').textContent = cat.desc;

  const list = document.getElementById('topic-list');
  list.innerHTML = cat.topics.map((t, i) => `
    <div class="topic-card ${t.videoId ? 'has-video' : ''}" onclick="showTopic('${catId}','${t.id}')">
      <div class="topic-card-num">${t.videoId ? '▶' : i + 1}</div>
      <div class="topic-card-body">
        <div class="topic-card-title">${t.title}</div>
        <div class="topic-card-desc">${t.desc}</div>
      </div>
      <div class="topic-card-arrow">›</div>
    </div>
  `).join('');

  showView('view-category');
}

function showTopic(catId, topicId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const topic = cat.topics.find(t => t.id === topicId);
  if (!topic) return;

  document.getElementById('topic-bar-title').textContent = topic.title;
  document.getElementById('topic-title').textContent = topic.title;
  document.getElementById('topic-desc').textContent = topic.desc;
  document.getElementById('topic-notes').textContent = topic.notes;

  document.getElementById('topic-back-btn').onclick = () => showCategory(catId);

  const container = document.getElementById('video-container');
  if (topic.videoId) {
    container.innerHTML = `<iframe
      src="https://www.youtube.com/embed/${topic.videoId}?rel=0&modestbranding=1&playsinline=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      loading="lazy"
    ></iframe>`;
  } else {
    container.innerHTML = `
      <div class="video-placeholder">
        <div class="video-placeholder-icon">🎬</div>
        <div class="video-placeholder-text">Video Coming Soon</div>
        <div class="video-placeholder-sub">This lesson is being prepared — check back soon.</div>
      </div>`;
  }

  showView('view-topic');
}

// ──────────────────────────────────────────────
// BUILD HOME GRIDS
// ──────────────────────────────────────────────
function buildGrids() {
  const generalGrid   = document.getElementById('general-grid');
  const specificGrid  = document.getElementById('specific-grid');

  categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = `cat-card ${cat.type}`;
    card.onclick = () => showCategory(cat.id);
    const videoCount = cat.topics.filter(t => t.videoId).length;
    const badge = videoCount > 0
      ? `<span style="font-size:11px;color:var(--primary);font-weight:700;">${videoCount} video${videoCount > 1 ? 's' : ''}</span>`
      : `<span style="font-size:11px;color:var(--muted);">${cat.topics.length} topics</span>`;
    card.innerHTML = `
      <span class="cat-card-icon">${cat.icon}</span>
      <div class="cat-card-title">${cat.title}</div>
      <div class="cat-card-desc">${cat.desc}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
        ${badge}
        <span style="font-size:18px;color:var(--primary);">›</span>
      </div>`;
    (cat.type === 'general' ? generalGrid : specificGrid).appendChild(card);
  });
}

buildGrids();
</script>
